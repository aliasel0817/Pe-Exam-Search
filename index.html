<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>기술사 문제 로컬 검색기 (DB 내장형)</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>
    
    <style>
        /* 정렬 헤더 마우스 오버 효과 및 커서 변경 */
        th.sortable { cursor: pointer; user-select: none; transition: background-color 0.2s; }
        th.sortable:hover { background-color: #e2e8f0; }
        /* 정렬 화살표 스타일 */
        .sort-icon { display: inline-block; width: 1em; text-align: center; color: #64748b; font-size: 0.8em; margin-left: 2px;}
        .sort-active { color: #2563eb; font-weight: bold; }
    </style>
</head>
<body class="bg-slate-50 p-4 md:p-8 font-sans">
    <div class="max-w-7xl mx-auto">
        <div class="flex justify-between items-end mb-2">
            <h1 class="text-2xl font-bold text-gray-800">📝 기술사 문제 검색</h1>
            <span id="db-status-badge" class="px-2 py-1 bg-gray-200 text-gray-700 text-xs font-bold rounded">상태 확인 중...</span>
        </div>
        <p class="text-sm text-gray-600 mb-6">최초 1회만 등록하면 이후에는 자동으로 열립니다.</p>
        
        <!-- 데이터 관리 패널 -->
        <div class="bg-blue-50 border border-blue-200 p-4 rounded-lg mb-6 flex flex-col md:flex-row items-center justify-between">
            <div class="mb-3 md:mb-0 w-full md:w-auto">
                <p class="text-sm font-semibold text-blue-800 mb-1">데이터베이스 관리</p>
                <p class="text-xs text-gray-500 mb-2">새로운 문제 리스트(list.xlsx)가 있다면 아래 버튼으로 DB를 갱신하세요.</p>
                
                <input type="file" id="excel-file" accept=".xlsx, .xls" class="hidden">
                <button onclick="document.getElementById('excel-file').click()" class="bg-blue-600 text-white text-sm font-semibold py-2 px-4 rounded-md hover:bg-blue-700 transition shadow-sm">
                    🔄 엑셀 파일로 DB 갱신 / 초기 등록
                </button>
            </div>
            <div id="file-status" class="text-sm text-blue-600 font-medium"></div>
        </div>

        <!-- 검색 조건 패널 -->
        <div class="bg-white p-4 rounded-lg shadow-md mb-6 grid grid-cols-1 md:grid-cols-6 gap-4">
            <div class="md:col-span-6">
                <label class="block text-sm font-medium text-gray-700">문제 내용 검색 (띄어쓰기 시 AND 검색)</label>
                <input type="text" id="keyword" placeholder="예: RAG 인공지능" class="mt-1 block w-full p-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700">구분</label>
                <input type="text" id="category" placeholder="예: 기출" class="mt-1 block w-full p-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">회차</label>
                <input type="text" id="session" placeholder="예: 139" class="mt-1 block w-full p-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">종목</label>
                <select id="track" class="mt-1 block w-full p-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500">
                    <option value="">전체</option>
                    <option value="관리">정보관리</option>
                    <option value="컴시">컴퓨터시스템응용</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">유형 (교시)</label>
                <select id="q_type" class="mt-1 block w-full p-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500">
                    <option value="">전체</option>
                    <option value="1">1교시</option>
                    <option value="2">2교시</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">년월</label>
                <input type="text" id="year_month" placeholder="예: 2026.05" class="mt-1 block w-full p-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500">
            </div>

            <div class="flex items-end space-x-2">
                <button onclick="applyFilters()" class="w-full bg-slate-700 text-white font-semibold py-2 px-3 rounded-md hover:bg-slate-800 transition shadow-sm text-sm">
                    조회
                </button>
                <button onclick="resetFilters()" class="w-full bg-gray-400 text-white font-semibold py-2 px-3 rounded-md hover:bg-gray-500 transition shadow-sm text-sm">
                    초기화
                </button>
            </div>
        </div>

        <div class="flex justify-between items-center mb-4">
            <p class="text-sm font-medium text-gray-600" id="result-info">검색 결과가 여기에 표시됩니다.</p>
        </div>

        <!-- 데이터 테이블 영역 -->
        <div class="bg-white rounded-lg shadow-md overflow-x-auto border border-gray-200">
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-100">
                    <tr>
                        <!-- 정렬 이벤트를 위한 sortable 클래스와 onclick 속성 추가 -->
                        <th class="sortable px-4 py-3 text-left text-xs font-bold text-gray-600 uppercase whitespace-nowrap" onclick="sortTable('구분')">
                            구분 <span id="sort-icon-구분" class="sort-icon"></span>
                        </th>
                        <th class="sortable px-4 py-3 text-left text-xs font-bold text-gray-600 uppercase whitespace-nowrap" onclick="sortTable('회차')">
                            회차 <span id="sort-icon-회차" class="sort-icon"></span>
                        </th>
                        <th class="sortable px-4 py-3 text-left text-xs font-bold text-gray-600 uppercase whitespace-nowrap" onclick="sortTable('종목')">
                            종목 <span id="sort-icon-종목" class="sort-icon"></span>
                        </th>
                        <th class="sortable px-4 py-3 text-center text-xs font-bold text-gray-600 uppercase whitespace-nowrap" onclick="sortTable('유형')">
                            유형 <span id="sort-icon-유형" class="sort-icon"></span>
                        </th>
                        <th class="sortable px-6 py-3 text-left text-xs font-bold text-gray-600 uppercase" onclick="sortTable('문제')">
                            출제 문제 <span id="sort-icon-문제" class="sort-icon"></span>
                        </th>
                        <th class="sortable px-4 py-3 text-left text-xs font-bold text-gray-600 uppercase whitespace-nowrap" onclick="sortTable('년월')">
                            년월 <span id="sort-icon-년월" class="sort-icon"></span>
                        </th>
                    </tr>
                </thead>
                <tbody id="table-body" class="bg-white divide-y divide-gray-200 text-sm">
                    <tr>
                        <td colspan="6" class="text-center py-8 text-gray-500">로딩 중입니다...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let globalData = [];
        let currentFilteredData = []; // 검색된 결과 데이터 (정렬 대상)
        const DB_KEY = 'pe_exam_questions_db_v2';

        // 정렬 상태 관리 변수
        let currentSortColumn = '회차'; // 기본 정렬 기준
        let currentSortDirection = 'desc'; // 'asc' 또는 'desc'

        async function initApp() {
            try {
                const savedData = await localforage.getItem(DB_KEY);
                if (savedData && savedData.length > 0) {
                    globalData = savedData;
                    document.getElementById('db-status-badge').className = "px-2 py-1 bg-green-100 text-green-800 text-xs font-bold rounded";
                    document.getElementById('db-status-badge').innerText = "DB 연동됨";
                    document.getElementById('file-status').innerText = `✅ 내장 DB에서 ${globalData.length}건을 불러왔습니다.`;
                    
                    // 초기화 시 기본 정렬 세팅(회차 내림차순) 후 검색 실행
                    currentSortColumn = '회차';
                    currentSortDirection = 'desc';
                    resetFilters();
                } else {
                    document.getElementById('db-status-badge').className = "px-2 py-1 bg-red-100 text-red-800 text-xs font-bold rounded";
                    document.getElementById('db-status-badge').innerText = "DB 없음";
                    document.getElementById('file-status').innerText = "⚠️ 등록된 데이터가 없습니다. 엑셀 파일을 등록해주세요.";
                    document.getElementById('table-body').innerHTML = `<tr><td colspan="6" class="text-center py-8 text-gray-500">상단의 <span class="font-semibold text-blue-600">초기 등록</span> 버튼을 눌러 엑셀 파일을 업로드해주세요.</td></tr>`;
                }
            } catch (err) {
                console.error("DB 로딩 에러:", err);
            }
        }

        document.getElementById('excel-file').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            const statusDiv = document.getElementById('file-status');
            const badge = document.getElementById('db-status-badge');
            
            statusDiv.innerHTML = '<span class="animate-pulse">데이터 파싱 및 DB 저장 중...⏳</span>';
            badge.className = "px-2 py-1 bg-yellow-100 text-yellow-800 text-xs font-bold rounded";
            badge.innerText = "갱신 중...";

            reader.onload = async function(e) {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, {type: 'array'});
                    const firstSheetName = workbook.SheetNames[0];
                    const worksheet = workbook.Sheets[firstSheetName];
                    
                    const parsedData = XLSX.utils.sheet_to_json(worksheet, {defval: ''});
                    
                    await localforage.setItem(DB_KEY, parsedData);
                    globalData = parsedData;
                    
                    statusDiv.innerHTML = `✅ DB 갱신 완료 (총 ${globalData.length}건)`;
                    badge.className = "px-2 py-1 bg-green-100 text-green-800 text-xs font-bold rounded";
                    badge.innerText = "DB 연동됨";
                    
                    resetFilters();
                    document.getElementById('excel-file').value = '';

                } catch (error) {
                    console.error("오류:", error);
                    statusDiv.innerHTML = `<span class="text-red-500">❌ 파일 처리 실패. 데이터 형식을 확인하세요.</span>`;
                    badge.className = "px-2 py-1 bg-red-100 text-red-800 text-xs font-bold rounded";
                    badge.innerText = "오류 발생";
                }
            };
            reader.readAsArrayBuffer(file);
        });

        const inputs = document.querySelectorAll('input[type="text"]');
        inputs.forEach(input => {
            input.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') applyFilters();
            });
        });

        function applyFilters() {
            if (globalData.length === 0) {
                alert("등록된 데이터가 없습니다. 먼저 엑셀 파일을 등록해주세요.");
                return;
            }

            const keywordStr = document.getElementById('keyword').value.trim();
            const category = document.getElementById('category').value.trim();
            const session = document.getElementById('session').value.trim();
            const track = document.getElementById('track').value;
            const qType = document.getElementById('q_type').value;
            const yearMonth = document.getElementById('year_month').value.trim();

            const keywords = keywordStr ? keywordStr.split(/\s+/) : [];

            // 1. 필터링 수행
            currentFilteredData = globalData.filter(row => {
                const rowProblem = String(row['문제'] || '').toLowerCase();
                const rowCategory = String(row['구분'] || '');
                const rowSession = String(row['회차'] || '');
                const rowTrack = String(row['종목'] || '');
                const rowType = String(row['유형'] || '');
                const rowYearMonth = String(row['년월'] || '');

                let keywordMatch = true;
                if (keywords.length > 0) {
                    for (let kw of keywords) {
                        if (!rowProblem.includes(kw.toLowerCase())) {
                            keywordMatch = false;
                            break;
                        }
                    }
                }

                return keywordMatch 
                    && (category === "" || rowCategory.includes(category))
                    && (session === "" || rowSession.includes(session))
                    && (track === "" || rowTrack.includes(track))
                    && (qType === "" || rowType === qType)
                    && (yearMonth === "" || rowYearMonth.includes(yearMonth));
            });

            // 2. 현재 정렬 설정에 맞춰 정렬 수행 및 화면 갱신
            executeSortAndRender();
        }

        // 특정 컬럼 헤더 클릭 시 호출되는 정렬 함수
        function sortTable(columnName) {
            if (currentFilteredData.length === 0) return;

            // 같은 컬럼을 다시 클릭하면 정렬 방향(오름차순/내림차순)을 반대로 변경
            if (currentSortColumn === columnName) {
                currentSortDirection = currentSortDirection === 'asc' ? 'desc' : 'asc';
            } else {
                // 다른 컬럼을 클릭하면 해당 컬럼의 오름차순(asc)으로 초기 설정
                currentSortColumn = columnName;
                currentSortDirection = 'asc';
            }

            executeSortAndRender();
        }

        // 실제 데이터 배열을 정렬하고 테이블을 다시 그리는 로직
        function executeSortAndRender() {
            // 헤더 아이콘 UI 업데이트
            updateSortIcons();

            currentFilteredData.sort((a, b) => {
                let valA = String(a[currentSortColumn] || '');
                let valB = String(b[currentSortColumn] || '');

                // 숫자형 데이터인 경우 (회차 등) 숫자로 파싱하여 비교
                if (!isNaN(valA) && !isNaN(valB) && valA !== '' && valB !== '') {
                    valA = Number(valA);
                    valB = Number(valB);
                }

                if (valA < valB) return currentSortDirection === 'asc' ? -1 : 1;
                if (valA > valB) return currentSortDirection === 'asc' ? 1 : -1;
                return 0; // 같을 경우
            });

            renderTable(currentFilteredData);
        }

        // 정렬 상태를 나타내는 화살표 아이콘 업데이트
        function updateSortIcons() {
            const columns = ['구분', '회차', '종목', '유형', '문제', '년월'];
            
            columns.forEach(col => {
                const iconElement = document.getElementById(`sort-icon-${col}`);
                if (iconElement) {
                    if (col === currentSortColumn) {
                        iconElement.innerHTML = currentSortDirection === 'asc' ? '▲' : '▼';
                        iconElement.classList.add('sort-active');
                    } else {
                        iconElement.innerHTML = '';
                        iconElement.classList.remove('sort-active');
                    }
                }
            });
        }

        function resetFilters() {
            document.getElementById('keyword').value = '';
            document.getElementById('category').value = '';
            document.getElementById('session').value = '';
            document.getElementById('track').value = '';
            document.getElementById('q_type').value = '';
            document.getElementById('year_month').value = '';
            
            currentSortColumn = '회차'; // 초기화 시 회차 기준으로 복구
            currentSortDirection = 'desc';
            
            applyFilters(); 
        }

        function renderTable(dataArray) {
            const tbody = document.getElementById('table-body');
            const resultInfo = document.getElementById('result-info');

            const MAX_DISPLAY = 500;
            const displayData = dataArray.slice(0, MAX_DISPLAY);

            resultInfo.innerHTML = `검색 결과: 총 <span class="font-bold text-blue-600">${dataArray.length}</span>건 
                                    ${dataArray.length > MAX_DISPLAY ? '(성능을 위해 최대 500건만 표시됩니다)' : ''}`;

            if (displayData.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" class="text-center py-6 text-gray-500">조건에 맞는 검색 결과가 없습니다.</td></tr>`;
                return;
            }

            let rowsHtml = '';
            displayData.forEach(item => {
                let rawProblem = String(item['문제'] || '-');
                
                // HTML 태그 보호 및 줄바꿈 압축/변환 (이전 요건 유지)
                let safeProblem = rawProblem.replace(/</g, "&lt;").replace(/>/g, "&gt;");
                let compressedProblem = safeProblem.replace(/(?:\r\n|\r|\n)+/g, '\n');
                let formattedProblem = compressedProblem.replace(/\n/g, '<br>');

                rowsHtml += `
                    <tr class="hover:bg-blue-50 transition border-b border-gray-100">
                        <td class="px-4 py-3 whitespace-nowrap text-gray-700">${item['구분'] || '-'}</td>
                        <td class="px-4 py-3 whitespace-nowrap text-gray-700">${item['회차'] || '-'}</td>
                        <td class="px-4 py-3 whitespace-nowrap text-gray-700">${item['종목'] || '-'}</td>
                        <td class="px-4 py-3 whitespace-nowrap text-center text-gray-700">${item['유형'] || '-'}</td>
                        <td class="px-6 py-3 font-medium text-gray-900 break-words leading-snug">${formattedProblem}</td>
                        <td class="px-4 py-3 whitespace-nowrap text-gray-500">${item['년월'] || '-'}</td>
                    </tr>
                `;
            });

            tbody.innerHTML = rowsHtml;
        }

        window.onload = initApp;
    </script>
</body>
</html>
